version: "3.8"

services:
  web:
    build: ./test-frontend
    ports:
      - "3013:80"
    restart: unless-stopped
  email-service:
    build: ./email-service
    ports:
      - "4000:9292"
    environment:
      - EZPROXY_EMAIL_RELAY=${EZPROXY_EMAIL_RELAY}
      - EZPROXY_EMAIL_SENDER=${EZPROXY_EMAIL_SENDER}
      - EZPROXY_EMAIL_TARGETS=${EZPROXY_EMAIL_TARGETS}
      - EZPROXY_CORS_ORIGINS=${EZPROXY_CORS_ORIGINS}

    restart: unless-stopped
  database:
    build: ./database-service
    volumes:
      - sqlite-data:/data
    restart: unless-stopped
  cleanup-service:
    build: ./cleanup-service
    volumes:
      - sqlite-data:/data
    environment:
      - CLEANUP_TIME=${CLEANUP_TIME:-02:00}
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
    restart: unless-stopped
    depends_on:
      - database

volumes:
  sqlite-data:
